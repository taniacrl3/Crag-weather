<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crag Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd7;
    --text: #1a1714;
    --text-2: #6b6460;
    --text-3: #9e9894;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --warn: #c0392b;
    --warn-light: #fdf0ef;
    --ok: #2d7a4a;
    --caution: #c87d2f;
    --caution-light: #fdf5e8;
    --rain-bar: #5b8fc4;
    --cloud-bar: #adb5c4;
    --wind-bar: #7faa8b;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
  .header-top h1 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; letter-spacing: -0.01em; }
  .header-top .subtitle { font-size: 0.7rem; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .location-tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .location-tabs::-webkit-scrollbar { display: none; }
  .loc-tab {
    background: none; border: none; border-bottom: 3px solid transparent;
    padding: 10px 16px; font-family: 'DM Mono', monospace; font-size: 0.72rem;
    color: var(--text-3); cursor: pointer; white-space: nowrap; letter-spacing: 0.04em;
    transition: color 0.15s, border-color 0.15s;
  }
  .loc-tab:hover { color: var(--text-2); }
  .loc-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* DAY TABS */
  .day-nav { display: flex; gap: 8px; padding: 20px 24px 0; margin-bottom: -1px; }
  .day-tab {
    background: var(--surface2); border: 1px solid var(--border);
    border-bottom: none; border-radius: var(--radius) var(--radius) 0 0;
    padding: 10px 24px; font-family: 'DM Mono', monospace; font-size: 0.75rem;
    color: var(--text-2); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
  }
  .day-tab.active { background: var(--surface); color: var(--text); font-weight: 500; }
  .day-tab .day-date { display: block; font-size: 0.65rem; color: var(--text-3); margin-top: 2px; }

  /* MAIN */
  main { padding: 0 24px; max-width: 900px; margin: 0 auto; }
  .day-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) var(--radius);
    padding: 24px; margin-bottom: 16px;
  }

  /* STATUS BANNER */
  .status-banner {
    border-radius: 8px; padding: 12px 16px; font-size: 0.78rem;
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .status-banner.good    { background: var(--accent-light); color: var(--accent); border: 1px solid #c2d9c8; }
  .status-banner.warn    { background: var(--warn-light);   color: var(--warn);   border: 1px solid #f0c4be; }
  .status-banner.caution { background: var(--caution-light);color: var(--caution);border: 1px solid #f0dfc0; }
  .status-banner .icon { font-size: 1.1rem; flex-shrink: 0; }

  /* NARRATIVE CARD */
  .narrative-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 22px; margin-bottom: 20px;
  }
  .narrative-card .narr-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px; gap: 12px; flex-wrap: wrap;
  }
  .narr-title {
    font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--text);
  }
  .sun-times {
    display: flex; gap: 16px; font-size: 0.68rem; color: var(--text-3);
    white-space: nowrap; padding-top: 4px;
  }
  .sun-times span { display: flex; align-items: center; gap: 4px; }

  .narrative-body { font-size: 0.78rem; line-height: 1.7; color: var(--text-2); }
  .narrative-body p { margin-bottom: 10px; }
  .narrative-body p:last-child { margin-bottom: 0; }

  .time-blocks {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px;
  }
  .time-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  .time-block .tb-label {
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-3); margin-bottom: 6px;
  }
  .time-block .tb-text { font-size: 0.74rem; line-height: 1.6; color: var(--text-2); }

  /* HERO STATS */
  .hero-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 14px; text-align: center;
  }
  .stat-card .stat-icon { font-size: 1.4rem; margin-bottom: 6px; display: block; }
  .stat-card .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 4px; }
  .stat-card .stat-value { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); line-height: 1; }
  .stat-card .stat-sub { font-size: 0.65rem; color: var(--text-3); margin-top: 4px; }
  .stat-card.flagged { background: var(--warn-light); border-color: #f0c4be; }
  .stat-card.flagged .stat-value { color: var(--warn); }

  /* AQI CARD */
  .aqi-card {
    border-radius: 10px; padding: 16px 20px; margin-bottom: 20px;
    border: 1px solid var(--border); display: flex; align-items: center; gap: 20px;
  }
  .aqi-card .aqi-icon { font-size: 2rem; }
  .aqi-card .aqi-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 2px; }
  .aqi-card .aqi-number { font-family: 'DM Serif Display', serif; font-size: 2.2rem; line-height: 1; }
  .aqi-card .aqi-category { font-size: 0.75rem; margin-top: 2px; }
  .aqi-card .aqi-sources { margin-left: auto; font-size: 0.68rem; color: var(--text-3); text-align: right; }
  .aqi-card.aqi-good      { background: #edf6f0; }
  .aqi-card.aqi-moderate  { background: #fdf8e8; }
  .aqi-card.aqi-sensitive { background: #fdf2e8; }
  .aqi-card.aqi-unhealthy { background: var(--warn-light); }

  /* HOURLY CHART */
  .chart-section { margin-bottom: 20px; }
  .section-label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-3); margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .hourly-chart { display: grid; grid-template-columns: 48px repeat(24, 1fr); gap: 0; font-size: 0.62rem; }
  .row-label { font-size: 0.6rem; color: var(--text-3); display: flex; align-items: center; padding-right: 8px; letter-spacing: 0.03em; }
  .hour-label {
    font-size: 0.55rem; color: var(--text-3); margin-bottom: 4px;
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    height: 28px; display: flex; align-items: center;
  }
  .bar-wrap { width: 100%; height: 60px; display: flex; flex-direction: column; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 1px; }
  .bar.rain  { background: var(--rain-bar); }
  .bar.cloud { background: var(--cloud-bar); }
  .bar.wind  { background: var(--wind-bar); }
  .bar.rain.flagged { background: var(--warn); }
  .sky-row { display: grid; grid-template-columns: 48px repeat(24, 1fr); margin-bottom: 8px; }
  .sky-icon { font-size: 0.9rem; text-align: center; line-height: 1; }
  .chart-legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; color: var(--text-2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* WET ROCK */
  .wet-rock-banner {
    background: #eef4fb; border: 1px solid #c0d8f0; border-radius: 8px;
    padding: 12px 16px; font-size: 0.75rem; color: #2c5f8a;
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px;
  }
  .wet-rock-banner .wr-icon { font-size: 1.2rem; flex-shrink: 0; }
  .wet-rock-banner strong { display: block; margin-bottom: 2px; }

  /* SOURCE TABLE */
  .source-table-section { margin-top: 4px; }
  .source-table {
    width: 100%; border-collapse: collapse; font-size: 0.68rem; margin-top: 8px;
  }
  .source-table th {
    text-align: left; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-3); padding: 6px 8px; border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .source-table th:not(:first-child) { text-align: center; }
  .source-table td {
    padding: 8px 8px; border-bottom: 1px solid var(--border);
    vertical-align: middle; color: var(--text-2);
  }
  .source-table td:not(:first-child) { text-align: center; }
  .source-table tr:last-child td { border-bottom: none; }
  .source-table .src-name { font-weight: 500; color: var(--text); font-size: 0.7rem; }
  .source-table .src-meta { font-size: 0.6rem; color: var(--text-3); margin-top: 1px; }
  .source-table .consensus-row td { background: var(--accent-light); font-weight: 500; color: var(--accent); }
  .source-table .rain-flag { color: var(--warn); font-weight: 500; }
  .source-table .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle;
  }
  .dot-ok  { background: var(--ok); }
  .dot-err { background: var(--warn); }

  /* LOADING / ERROR */
  .loading-state { text-align: center; padding: 60px 20px; color: var(--text-3); font-size: 0.8rem; letter-spacing: 0.05em; }
  .loading-state .spinner {
    display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { background: var(--warn-light); border: 1px solid #f0c4be; border-radius: 8px; padding: 16px 20px; font-size: 0.75rem; color: var(--warn); margin: 20px 0; }

  .last-updated { font-size: 0.6rem; color: var(--text-3); text-align: right; margin-top: 12px; letter-spacing: 0.04em; }

  /* CHART SCROLL WRAPPER */
  .chart-scroll-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    margin: 0 -4px;
    padding: 0 4px 6px;
  }
  .chart-scroll-wrap::-webkit-scrollbar { height: 4px; }
  .chart-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
  .chart-scroll-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .hourly-chart-inner { min-width: 640px; }

  /* SOURCE CARDS (mobile) */
  .src-cards { display: none; gap: 10px; flex-direction: column; margin-top: 8px; }
  .src-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  .src-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .src-card-name { font-size: 0.72rem; font-weight: 500; color: var(--text); }
  .src-card-meta { font-size: 0.6rem; color: var(--text-3); margin-top: 1px; }
  .src-card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .src-card-stat { text-align: center; }
  .src-card-stat .scs-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }
  .src-card-stat .scs-val   { font-size: 0.8rem; color: var(--text); font-weight: 500; margin-top: 2px; }
  .src-card-stat .scs-val.rain-flag { color: var(--warn); }
  .src-card.consensus { background: var(--accent-light); border-color: #c2d9c8; }
  .src-card.consensus .src-card-name { color: var(--accent); }
  .src-card.consensus .scs-val { color: var(--accent); }
  .src-card-sky { font-size: 0.68rem; color: var(--text-2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .src-card-unavail { font-size: 0.72rem; color: var(--text-3); }

  @media (max-width: 640px) {
    header { padding: 14px 14px 0; }
    .header-top h1 { font-size: 1.25rem; }
    .header-top .subtitle { display: none; }
    .loc-tab { padding: 10px 12px; font-size: 0.68rem; }
    .day-tab { padding: 10px 18px; }
    main { padding: 0 10px; }
    .day-panel { padding: 14px; }
    .hero-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .time-blocks { grid-template-columns: 1fr; }
    .narr-title { font-size: 1rem; }
    .narrative-card { padding: 16px; }
    .source-table-wrap { display: none; }
    .src-cards { display: flex; }
    .aqi-card { flex-wrap: wrap; gap: 12px; }
    .aqi-card .aqi-sources { margin-left: 0; text-align: left; }
    .status-banner { font-size: 0.73rem; }
    .wet-rock-banner { font-size: 0.72rem; }
  }

  @media (max-width: 380px) {
    .stat-card { padding: 12px 10px; }
    .stat-card .stat-value { font-size: 1.3rem; }
    .loc-tab { padding: 10px 10px; font-size: 0.64rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Crag Weather</h1>
    <span class="subtitle">Climbing Conditions</span>
  </div>
  <nav class="location-tabs" id="locationTabs"></nav>
</header>

<div class="day-nav" id="dayNav"></div>

<main id="mainContent">
  <div class="loading-state"><div class="spinner"></div><br>Loading forecast…</div>
</main>

<script>
// ─────────────────────────────────────────
// LOCATIONS
// ─────────────────────────────────────────
const LOCATIONS = [
  { id: "terrebonne", name: "Smith Rock",   sub: "Terrebonne, OR", lat: 44.3612,  lon: -121.1743, nwsGrid: "PDT/97,57"   },
  { id: "monticello", name: "Indian Creek", sub: "Monticello, UT", lat: 37.8722,  lon: -109.3417, nwsGrid: "SLC/114,38"  },
  { id: "northbend",  name: "Exit 38",      sub: "North Bend, WA", lat: 47.4957,  lon: -121.7863, nwsGrid: "SEW/154,74"  },
  { id: "index",      name: "Index",        sub: "Index, WA",      lat: 47.8195,  lon: -121.5559, nwsGrid: "SEW/163,84"  },
];
const RAIN_FLAG = 20;

let currentLoc = LOCATIONS[0];
let currentDay = null;
let cache = {};

// ─────────────────────────────────────────
// DATES
// ─────────────────────────────────────────
function getWeekendDates() {
  const today = new Date();
  const dow = today.getDay();
  let daysToSat = (6 - dow + 7) % 7;
  if (daysToSat === 0) daysToSat = 7;
  const sat = new Date(today); sat.setDate(today.getDate() + daysToSat);
  const sun = new Date(sat);   sun.setDate(sat.getDate() + 1);
  const fri = new Date(sat);   fri.setDate(sat.getDate() - 1);
  const thu = new Date(sat);   thu.setDate(sat.getDate() - 2);
  return { sat, sun, fri, thu };
}
function fmtDate(d) { return d.toISOString().slice(0, 10); }
function closerDay(sat, sun) {
  const now = new Date();
  return Math.abs(sat - now) <= Math.abs(sun - now) ? "Saturday" : "Sunday";
}

// ─────────────────────────────────────────
// FETCH
// ─────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchOpenMeteo(loc, satStr, sunStr) {
  const params = new URLSearchParams({
    latitude: loc.lat, longitude: loc.lon,
    daily:   "temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max,weathercode,sunrise,sunset,windgusts_10m_max",
    hourly:  "precipitation_probability,cloudcover,windspeed_10m,weathercode,temperature_2m,windgusts_10m",
    temperature_unit: "fahrenheit", windspeed_unit: "mph",
    timezone: "auto", start_date: satStr, end_date: sunStr,
  });
  return fetchJSON(`https://api.open-meteo.com/v1/forecast?${params}`);
}

async function fetchOpenMeteoAQ(loc, satStr, sunStr) {
  const params = new URLSearchParams({
    latitude: loc.lat, longitude: loc.lon,
    hourly: "us_aqi,pm2_5", timezone: "auto",
    start_date: satStr, end_date: sunStr,
  });
  try { return await fetchJSON(`https://air-quality-api.open-meteo.com/v1/air-quality?${params}`); }
  catch(e) { return null; }
}

async function fetchNWSDaily(loc) {
  try {
    const d = await fetchJSON(`https://api.weather.gov/gridpoints/${loc.nwsGrid}/forecast`);
    return d.properties.periods;
  } catch(e) { return []; }
}

async function fetchNWSHourly(loc) {
  try {
    const d = await fetchJSON(`https://api.weather.gov/gridpoints/${loc.nwsGrid}/forecast/hourly`);
    return d.properties.periods;
  } catch(e) { return []; }
}

async function fetchPrevDayRain(loc, friStr, thuStr) {
  try {
    const params = new URLSearchParams({
      latitude: loc.lat, longitude: loc.lon,
      daily: "precipitation_sum,temperature_2m_min",
      timezone: "auto", start_date: thuStr, end_date: friStr,
    });
    const d = await fetchJSON(`https://api.open-meteo.com/v1/forecast?${params}`);
    return {
      friRain: d?.daily?.precipitation_sum?.[1] ?? null,
      thuRain: d?.daily?.precipitation_sum?.[0] ?? null,
      friLow:  d?.daily?.temperature_2m_min?.[1] ?? null,
    };
  } catch(e) { return { friRain: null, thuRain: null, friLow: null }; }
}

// ─────────────────────────────────────────
// LOAD & AGGREGATE
// ─────────────────────────────────────────
async function loadData(loc) {
  if (cache[loc.id]) return cache[loc.id];
  const { sat, sun, fri, thu } = getWeekendDates();
  const satStr = fmtDate(sat), sunStr = fmtDate(sun), friStr = fmtDate(fri), thuStr = fmtDate(thu);

  const [omRes, aqRes, nwsDRes, nwsHRes, prevRes] = await Promise.allSettled([
    fetchOpenMeteo(loc, satStr, sunStr),
    fetchOpenMeteoAQ(loc, satStr, sunStr),
    fetchNWSDaily(loc),
    fetchNWSHourly(loc),
    fetchPrevDayRain(loc, friStr, thuStr),
  ]);

  const result = {
    sat, sun, fri, thu, satStr, sunStr, friStr, thuStr, loc,
    om:      omRes.status    === "fulfilled" ? omRes.value    : null,
    aq:      aqRes.status    === "fulfilled" ? aqRes.value    : null,
    nwsD:    nwsDRes.status  === "fulfilled" ? nwsDRes.value  : [],
    nwsH:    nwsHRes.status  === "fulfilled" ? nwsHRes.value  : [],
    prev:    prevRes.status  === "fulfilled" ? prevRes.value  : { friRain: null, thuRain: null, friLow: null },
    omOk:    omRes.status    === "fulfilled",
    aqOk:    aqRes.status    === "fulfilled",
    nwsOk:   nwsDRes.status  === "fulfilled",
  };
  cache[loc.id] = result;
  return result;
}

// ─────────────────────────────────────────
// DATA EXTRACTION
// ─────────────────────────────────────────
function getHourlyForDay(data, dateStr) {
  const om = data.om;
  if (!om) return [];
  const { time, precipitation_probability: rain, cloudcover: cloud,
          windspeed_10m: wind, weathercode: code, temperature_2m: temp, windgusts_10m: gusts } = om.hourly;
  const hours = [];
  for (let i = 0; i < time.length; i++) {
    if (time[i].slice(0,10) === dateStr) {
      hours.push({
        hour:  parseInt(time[i].slice(11,13)),
        rain:  rain[i]  ?? 0,
        cloud: cloud[i] ?? 0,
        wind:  wind[i]  ?? 0,
        gust:  gusts[i] ?? 0,
        code:  code[i]  ?? 0,
        temp:  temp[i]  ?? null,
      });
    }
  }
  // blend NWS hourly rain
  if (data.nwsH?.length) {
    for (const h of hours) {
      const p = data.nwsH.find(p => p.startTime.slice(0,10) === dateStr && parseInt(p.startTime.slice(11,13)) === h.hour);
      if (p) {
        const nwsPct = p.probabilityOfPrecipitation?.value ?? null;
        if (nwsPct !== null) h.rain = Math.round((h.rain + nwsPct) / 2);
      }
    }
  }
  return hours;
}

function getDailyForDay(data, dateStr) {
  const om = data.om;
  if (!om) return null;
  const idx = om.daily.time.indexOf(dateStr);
  if (idx === -1) return null;
  const rawSunrise = om.daily.sunrise?.[idx];
  const rawSunset  = om.daily.sunset?.[idx];
  return {
    high:    Math.round(om.daily.temperature_2m_max[idx]),
    low:     Math.round(om.daily.temperature_2m_min[idx]),
    rain:    om.daily.precipitation_probability_max[idx] ?? 0,
    wind:    Math.round(om.daily.windspeed_10m_max[idx]  ?? 0),
    gusts:   Math.round(om.daily.windgusts_10m_max?.[idx] ?? 0),
    code:    om.daily.weathercode[idx] ?? 0,
    sunrise: rawSunrise ? new Date(rawSunrise).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) : null,
    sunset:  rawSunset  ? new Date(rawSunset).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})  : null,
    sunriseHour: rawSunrise ? new Date(rawSunrise).getHours() : 6,
  };
}

function getNWSDataForDay(data, dateStr) {
  if (!data.nwsD?.length) return null;
  const dayP   = data.nwsD.find(p => p.startTime.slice(0,10) === dateStr && p.isDaytime);
  const nightP = data.nwsD.find(p => p.startTime.slice(0,10) === dateStr && !p.isDaytime);
  if (!dayP) return null;
  return {
    high:    dayP.temperature,
    low:     nightP?.temperature ?? null,
    rain:    dayP.probabilityOfPrecipitation?.value ?? null,
    wind:    dayP.windSpeed,
    sky:     dayP.shortForecast,
    detail:  dayP.detailedForecast,
  };
}

function getAQIForDay(data, dateStr) {
  const aq = data.aq;
  if (!aq) return null;
  const { time, us_aqi: aqis, pm2_5: pm25s } = aq.hourly;
  const da = [], dp = [];
  for (let i = 0; i < time.length; i++) {
    if (time[i].slice(0,10) === dateStr) {
      if (aqis[i]  != null) da.push(aqis[i]);
      if (pm25s[i] != null) dp.push(pm25s[i]);
    }
  }
  if (!da.length) return null;
  return {
    peak: Math.max(...da),
    avg:  Math.round(da.reduce((a,b)=>a+b,0)/da.length),
    pm25: dp.length ? (dp.reduce((a,b)=>a+b,0)/dp.length).toFixed(1) : null,
  };
}

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function wmoIcon(code) {
  if (code === 0)  return "☀️";
  if (code <= 2)   return "🌤️";
  if (code === 3)  return "☁️";
  if (code <= 48)  return "🌫️";
  if (code <= 55)  return "🌦️";
  if (code <= 67)  return "🌧️";
  if (code <= 77)  return "❄️";
  if (code <= 82)  return "🌦️";
  if (code >= 95)  return "⛈️";
  return "🌡️";
}
function wmoDesc(code) {
  if (code < 0)    return "—";
  if (code === 0)  return "Clear";
  if (code <= 2)   return "Partly Cloudy";
  if (code === 3)  return "Overcast";
  if (code <= 48)  return "Foggy";
  if (code <= 55)  return "Drizzle";
  if (code <= 67)  return "Rain";
  if (code <= 77)  return "Snow";
  if (code <= 82)  return "Showers";
  if (code >= 95)  return "Thunderstorm";
  return "—";
}
function aqiInfo(aqi) {
  if (aqi == null) return { label: "Unknown",                    cls: "",              icon: "❓", color: "#9e9894" };
  if (aqi <= 50)   return { label: "Good",                       cls: "aqi-good",      icon: "🟢", color: "#2d7a4a" };
  if (aqi <= 100)  return { label: "Moderate",                   cls: "aqi-moderate",  icon: "🟡", color: "#c87d2f" };
  if (aqi <= 150)  return { label: "Unhealthy for Sensitive",    cls: "aqi-sensitive", icon: "🟠", color: "#c05c20" };
  return               { label: "Unhealthy",                     cls: "aqi-unhealthy", icon: "🔴", color: "#c0392b" };
}
function windFeel(mph) {
  if (mph < 5)  return "calm";
  if (mph < 10) return "light breeze";
  if (mph < 15) return "moderate breeze";
  if (mph < 20) return "fresh wind";
  if (mph < 30) return "strong wind";
  return "very strong wind";
}
function tempFeel(f) {
  if (f < 32)  return "freezing";
  if (f < 40)  return "very cold";
  if (f < 50)  return "cold";
  if (f < 58)  return "cool";
  if (f < 68)  return "comfortable";
  if (f < 78)  return "warm";
  if (f < 88)  return "hot";
  return "very hot";
}

// ─────────────────────────────────────────
// NARRATIVE GENERATOR
// ─────────────────────────────────────────
function buildNarrative(daily, hourly, aqi, prev, dayLabel, data) {
  if (!daily || !hourly.length) return { morning: "No data available.", afternoon: "", overnight: "", summary: "" };

  const amHours = hourly.filter(h => h.hour >= (daily.sunriseHour || 6) && h.hour < 12);
  const pmHours = hourly.filter(h => h.hour >= 12 && h.hour <= 18);
  const eveHours = hourly.filter(h => h.hour > 18);

  const avgAmRain  = amHours.length  ? Math.round(amHours.reduce((a,h)=>a+h.rain,0)/amHours.length)   : 0;
  const avgPmRain  = pmHours.length  ? Math.round(pmHours.reduce((a,h)=>a+h.rain,0)/pmHours.length)   : 0;
  const avgAmWind  = amHours.length  ? Math.round(amHours.reduce((a,h)=>a+h.wind,0)/amHours.length)   : 0;
  const avgPmWind  = pmHours.length  ? Math.round(pmHours.reduce((a,h)=>a+h.wind,0)/pmHours.length)   : 0;
  const avgAmCloud = amHours.length  ? Math.round(amHours.reduce((a,h)=>a+h.cloud,0)/amHours.length)  : 0;
  const avgPmCloud = pmHours.length  ? Math.round(pmHours.reduce((a,h)=>a+h.cloud,0)/pmHours.length)  : 0;
  const avgAmTemp  = amHours.length  ? Math.round(amHours.reduce((a,h)=>a+(h.temp||daily.low),0)/amHours.length) : daily.low;
  const avgPmTemp  = pmHours.length  ? Math.round(pmHours.reduce((a,h)=>a+(h.temp||daily.high),0)/pmHours.length) : daily.high;
  const maxGust    = Math.max(...hourly.map(h=>h.gust), 0);
  const rainHours  = hourly.filter(h => h.rain >= RAIN_FLAG);

  // overnight context from previous night's low
  const prevLow = prev?.friLow ?? null;
  let overnightNote = "";
  if (prevLow !== null) {
    if (prevLow < 32) overnightNote = `Overnight low was ${Math.round(prevLow)}°F — expect frost on approach trails and cold gear. Fingers may take time to warm up.`;
    else if (prevLow < 40) overnightNote = `Overnight low hit ${Math.round(prevLow)}°F — rock will be cold and slow to warm. Layering is a must at the start of the day.`;
    else if (prevLow < 50) overnightNote = `Overnight low was ${Math.round(prevLow)}°F — a chilly start, especially in shaded canyons and north-facing walls.`;
    else if (prevLow > 65) overnightNote = `Overnight low stayed around ${Math.round(prevLow)}°F — it'll be warm from the moment you arrive. Stay hydrated.`;
    else overnightNote = `Overnight low was ${Math.round(prevLow)}°F — mild start.`;
  }

  // morning block
  let morning = "";
  const amSkyDesc = avgAmCloud > 70 ? "overcast" : avgAmCloud > 40 ? "partly cloudy" : "clear";
  morning += `${daily.sunrise ? `Sunrise at ${daily.sunrise}.` : ""} Morning temps around ${avgAmTemp}°F — ${tempFeel(avgAmTemp)} in the shade. `;
  morning += `Skies ${amSkyDesc} with ${windFeel(avgAmWind)} (${avgAmWind} mph). `;
  if (avgAmRain >= RAIN_FLAG) morning += `⚠️ Rain chance ${avgAmRain}% in the morning — rock likely wet early. `;
  else morning += `Rain chance low at ${avgAmRain}%. `;
  if (overnightNote) morning += overnightNote;

  // afternoon block
  let afternoon = "";
  const pmSkyDesc = avgPmCloud > 70 ? "overcast" : avgPmCloud > 40 ? "building clouds" : "sunny";
  afternoon += `Temps climb to ${avgPmTemp}°F by afternoon — ${tempFeel(avgPmTemp)} on sun-facing walls. `;
  afternoon += `${pmSkyDesc.charAt(0).toUpperCase() + pmSkyDesc.slice(1)}, winds ${windFeel(avgPmWind)} at ${avgPmWind} mph. `;
  if (maxGust > avgPmWind + 8) afternoon += `Gusts up to ${maxGust} mph — watch exposed ridgelines. `;
  if (avgPmRain >= RAIN_FLAG) afternoon += `⚠️ Rain chance rises to ${avgPmRain}% in the afternoon.`;
  else if (avgPmRain > 10) afternoon += `Slight chance of afternoon showers (${avgPmRain}%).`;
  else afternoon += `Afternoon looks dry.`;

  // AQI note
  let aqiNote = "";
  if (aqi) {
    const ai = aqiInfo(aqi.peak);
    if (aqi.peak > 100) aqiNote = `Air quality ${ai.label.toLowerCase()} (AQI ${aqi.peak}) — consider a mask for sustained effort.`;
    else if (aqi.peak > 50) aqiNote = `Air quality moderate (AQI ${aqi.peak}). Fine for most climbers.`;
    else aqiNote = `Air quality good (AQI ${aqi.peak}).`;
  }

  // overall summary sentence
  const flaggedCount = rainHours.length;
  let summary = "";
  if (flaggedCount > 0) {
    summary = `${flaggedCount} hour${flaggedCount>1?"s":""} with rain chance above ${RAIN_FLAG}%. Verify conditions before committing.`;
  } else if (daily.wind > 25) {
    summary = `Winds significant — ${daily.wind} mph max. Good sending weather otherwise.`;
  } else {
    const feel = tempFeel(daily.high);
    summary = `High of ${daily.high}°F, ${feel}, ${wmoDesc(daily.code).toLowerCase()}. Looks like a ${daily.high > 75 ? "hot" : daily.high < 45 ? "cold" : "solid"} day on the rock.`;
  }

  return { morning, afternoon, aqiNote, summary };
}

function climbingStatus(daily, hourly, aqi) {
  if (!daily) return { cls: "caution", icon: "❓", text: "Forecast data unavailable." };
  const maxRain = hourly.length ? Math.max(...hourly.map(h=>h.rain)) : 0;
  const flagged = hourly.filter(h=>h.rain>=RAIN_FLAG);
  if (maxRain >= RAIN_FLAG)
    return { cls: "warn",    icon: "⛔", text: `Rain likely — ${flagged.length} hour${flagged.length>1?"s":""} above ${RAIN_FLAG}% chance. Verify before heading out.` };
  if ((aqi?.peak ?? 0) > 100)
    return { cls: "caution", icon: "😷", text: `Air quality ${aqiInfo(aqi.peak).label.toLowerCase()} (AQI ${aqi.peak}). Consider a mask for long days.` };
  if ((daily?.wind ?? 0) > 25)
    return { cls: "caution", icon: "💨", text: `Strong winds forecast — ${daily.wind} mph max, gusts to ${daily.gusts} mph. Watch exposed routes.` };
  return { cls: "good", icon: "✅", text: "Conditions look good. Rock should be dry and climbable." };
}

// ─────────────────────────────────────────
// SOURCE COMPARISON TABLE
// ─────────────────────────────────────────
function buildSourceTable(data, dayLabel, dateStr) {
  const daily   = getDailyForDay(data, dateStr);
  const nwsDay  = getNWSDataForDay(data, dateStr);

  // Collect rows per source
  const rows = [];

  // Open-Meteo
  if (data.omOk && daily) {
    rows.push({
      name: "Open-Meteo", meta: "open-meteo.com · no key",
      high: daily.high, low: daily.low,
      rain: daily.rain, wind: `${daily.wind} mph`,
      gusts: daily.gusts ? `${daily.gusts} mph` : "—",
      sky: wmoDesc(daily.code), ok: true,
    });
  } else {
    rows.push({ name: "Open-Meteo", meta: "open-meteo.com · no key", ok: false });
  }

  // NWS
  if (data.nwsOk && nwsDay) {
    rows.push({
      name: "Nat'l Weather Service", meta: "weather.gov · no key",
      high: nwsDay.high, low: nwsDay.low,
      rain: nwsDay.rain, wind: nwsDay.wind,
      gusts: "—", sky: nwsDay.sky, ok: true,
    });
  } else {
    rows.push({ name: "Nat'l Weather Service", meta: "weather.gov · no key", ok: false });
  }

  // AQI source row
  const aqi = getAQIForDay(data, dateStr);
  const aqiRow = aqi
    ? `<tr><td><div class="src-name"><span class="status-dot dot-ok"></span>Open-Meteo AQ</div><div class="src-meta">air-quality-api.open-meteo.com · no key</div></td>
        <td colspan="5">AQI ${aqi.peak} peak / ${aqi.avg} avg — ${aqiInfo(aqi.peak).label}${aqi.pm25 ? ` · PM2.5 ${aqi.pm25} µg/m³` : ""}</td></tr>`
    : `<tr><td><div class="src-name"><span class="status-dot dot-err"></span>Open-Meteo AQ</div><div class="src-meta">air-quality-api.open-meteo.com</div></td><td colspan="5" style="color:var(--text-3)">No data</td></tr>`;

  // Consensus row
  const okRows = rows.filter(r => r.ok);
  let consensusHTML = "";
  if (okRows.length) {
    const highs = okRows.filter(r=>r.high!=null).map(r=>r.high);
    const lows  = okRows.filter(r=>r.low!=null).map(r=>r.low);
    const rains = okRows.filter(r=>r.rain!=null).map(r=>r.rain);
    const hiRange  = highs.length ? (Math.min(...highs)===Math.max(...highs) ? `${Math.min(...highs)}°` : `${Math.min(...highs)}–${Math.max(...highs)}°`) : "—";
    const loRange  = lows.length  ? (Math.min(...lows)===Math.max(...lows)   ? `${Math.min(...lows)}°`  : `${Math.min(...lows)}–${Math.max(...lows)}°`)   : "—";
    const rainAvg  = rains.length ? Math.round(rains.reduce((a,b)=>a+b,0)/rains.length) : null;
    const rainFlagCls = (rainAvg ?? 0) >= RAIN_FLAG ? "rain-flag" : "";
    consensusHTML = `<tr class="consensus-row">
      <td><div class="src-name">★ Consensus</div><div class="src-meta">averaged across all sources</div></td>
      <td>${hiRange}</td><td>${loRange}</td>
      <td class="${rainFlagCls}">${rainAvg != null ? rainAvg+"%" : "—"}</td>
      <td>—</td><td>—</td><td>—</td>
    </tr>`;
  }

  const bodyRows = rows.map(r => {
    if (!r.ok) return `<tr>
      <td><div class="src-name"><span class="status-dot dot-err"></span>${r.name}</div><div class="src-meta">${r.meta}</div></td>
      <td colspan="6" style="color:var(--text-3)">Unavailable</td></tr>`;
    const rainCls = (r.rain ?? 0) >= RAIN_FLAG ? "rain-flag" : "";
    return `<tr>
      <td><div class="src-name"><span class="status-dot dot-ok"></span>${r.name}</div><div class="src-meta">${r.meta}</div></td>
      <td>${r.high != null ? r.high+"°" : "—"}</td>
      <td>${r.low  != null ? r.low+"°"  : "—"}</td>
      <td class="${rainCls}">${r.rain != null ? r.rain+"%" : "—"}</td>
      <td>${r.wind || "—"}</td>
      <td>${r.gusts || "—"}</td>
      <td style="font-size:0.65rem;color:var(--text-2)">${r.sky || "—"}</td>
    </tr>`;
  }).join("");

  // Mobile cards
  let mobileCards = "";

  // Consensus card
  if (okRows.length) {
    const highs2 = okRows.filter(r=>r.high!=null).map(r=>r.high);
    const lows2  = okRows.filter(r=>r.low!=null).map(r=>r.low);
    const rains2 = okRows.filter(r=>r.rain!=null).map(r=>r.rain);
    const hiR = highs2.length ? (Math.min(...highs2)===Math.max(...highs2) ? `${Math.min(...highs2)}deg` : `${Math.min(...highs2)}-${Math.max(...highs2)}deg`) : "N/A";
    const loR = lows2.length  ? (Math.min(...lows2)===Math.max(...lows2)   ? `${Math.min(...lows2)}deg`  : `${Math.min(...lows2)}-${Math.max(...lows2)}deg`)   : "N/A";
    const rainA2 = rains2.length ? Math.round(rains2.reduce((a,b)=>a+b,0)/rains2.length) : null;
    const rfc2 = (rainA2 ?? 0) >= RAIN_FLAG ? "rain-flag" : "";
    mobileCards += `<div class="src-card consensus">
      <div class="src-card-header"><div><div class="src-card-name">★ Consensus</div><div class="src-card-meta">averaged across all sources</div></div></div>
      <div class="src-card-grid">
        <div class="src-card-stat"><div class="scs-label">High</div><div class="scs-val">${hiR.replace('deg','°')}</div></div>
        <div class="src-card-stat"><div class="scs-label">Low</div><div class="scs-val">${loR.replace('deg','°')}</div></div>
        <div class="src-card-stat"><div class="scs-label">Rain</div><div class="scs-val ${rfc2}">${rainA2 != null ? rainA2+"%" : "—"}</div></div>
      </div>
    </div>`;
  }

  rows.forEach(r => {
    if (!r.ok) {
      mobileCards += `<div class="src-card"><div class="src-card-header"><div><div class="src-card-name"><span class="status-dot dot-err"></span>${r.name}</div><div class="src-card-meta">${r.meta}</div></div></div><div class="src-card-unavail">Unavailable</div></div>`;
      return;
    }
    const rfc = (r.rain ?? 0) >= RAIN_FLAG ? "rain-flag" : "";
    mobileCards += `<div class="src-card">
      <div class="src-card-header"><div><div class="src-card-name"><span class="status-dot dot-ok"></span>${r.name}</div><div class="src-card-meta">${r.meta}</div></div></div>
      <div class="src-card-grid">
        <div class="src-card-stat"><div class="scs-label">High</div><div class="scs-val">${r.high != null ? r.high+"°" : "—"}</div></div>
        <div class="src-card-stat"><div class="scs-label">Low</div><div class="scs-val">${r.low != null ? r.low+"°" : "—"}</div></div>
        <div class="src-card-stat"><div class="scs-label">Rain</div><div class="scs-val ${rfc}">${r.rain != null ? r.rain+"%" : "—"}</div></div>
        <div class="src-card-stat"><div class="scs-label">Wind</div><div class="scs-val">${r.wind || "—"}</div></div>
        <div class="src-card-stat"><div class="scs-label">Gusts</div><div class="scs-val">${r.gusts || "—"}</div></div>
        <div class="src-card-stat"><div class="scs-label">Sky</div><div class="scs-val" style="font-size:0.7rem">${r.sky ? wmoIcon(0)+"" : "—"}</div></div>
      </div>
      ${r.sky ? `<div class="src-card-sky">${r.sky}</div>` : ""}
    </div>`;
  });

  // AQI mobile card
  if (aqi) {
    const ai = aqiInfo(aqi.peak);
    mobileCards += `<div class="src-card">
      <div class="src-card-header"><div><div class="src-card-name"><span class="status-dot dot-ok"></span>Open-Meteo AQ</div><div class="src-card-meta">air-quality-api.open-meteo.com</div></div><span>${ai.icon}</span></div>
      <div class="src-card-grid">
        <div class="src-card-stat"><div class="scs-label">Peak AQI</div><div class="scs-val">${aqi.peak}</div></div>
        <div class="src-card-stat"><div class="scs-label">Avg AQI</div><div class="scs-val">${aqi.avg}</div></div>
        <div class="src-card-stat"><div class="scs-label">PM2.5</div><div class="scs-val">${aqi.pm25 ? aqi.pm25 : "—"}</div></div>
      </div>
      <div class="src-card-sky">${ai.label}</div>
    </div>`;
  }

  return `
    <div class="source-table-section">
      <div class="section-label">Source Comparison — ${dayLabel}</div>
      <div class="source-table-wrap">
        <table class="source-table">
          <thead><tr>
            <th>Source</th><th>High</th><th>Low</th><th>Rain</th><th>Wind</th><th>Gusts</th><th>Sky</th>
          </tr></thead>
          <tbody>
            ${consensusHTML}
            ${bodyRows}
            ${aqiRow}
          </tbody>
        </table>
      </div>
      <div class="src-cards">${mobileCards}</div>
    </div>`;
}

// ─────────────────────────────────────────
// HOURLY CHART
// ─────────────────────────────────────────
function renderHourlyChart(hourly) {
  if (!hourly.length) return "<div style='color:var(--text-3);font-size:0.75rem;padding:12px 0'>No hourly data.</div>";
  const maxWind = Math.max(...hourly.map(h=>h.wind), 1);
  const BAR_H = 60;

  let skyRow   = `<div class="sky-row"><div></div>`;
  let rainRow  = `<div class="row-label">🌧️ Rain</div>`;
  let cloudRow = `<div class="row-label">☁️ Cloud</div>`;
  let windRow  = `<div class="row-label">💨 Wind</div>`;
  let labelRow = `<div></div>`;

  hourly.forEach(h => {
    const rainH  = Math.round((h.rain  / 100) * BAR_H);
    const cloudH = Math.round((h.cloud / 100) * BAR_H);
    const windH  = Math.round((h.wind  / maxWind) * BAR_H);
    const fl = h.rain >= RAIN_FLAG ? "flagged" : "";
    const hs = h.hour===0?"12a":h.hour<12?`${h.hour}a`:h.hour===12?"12p":`${h.hour-12}p`;
    skyRow   += `<div class="sky-icon">${wmoIcon(h.code)}</div>`;
    rainRow  += `<div class="bar-wrap"><div class="bar rain ${fl}" style="height:${rainH}px"></div></div>`;
    cloudRow += `<div class="bar-wrap"><div class="bar cloud" style="height:${cloudH}px"></div></div>`;
    windRow  += `<div class="bar-wrap"><div class="bar wind" style="height:${windH}px"></div></div>`;
    labelRow += `<div class="hour-label">${hs}</div>`;
  });
  skyRow += `</div>`;

  return `
    <div class="chart-scroll-wrap">
      <div class="hourly-chart-inner">
        <div class="hourly-chart">
          ${skyRow}
          <div class="row-label" style="font-size:0.55rem;color:var(--text-3)">Sky</div>
          ${labelRow}
          ${rainRow}${cloudRow}${windRow}
        </div>
      </div>
    </div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--rain-bar)"></div>Rain %</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--warn)"></div>Rain ≥${RAIN_FLAG}%</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cloud-bar)"></div>Cloud cover %</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--wind-bar)"></div>Wind (relative)</div>
    </div>`;
}

// ─────────────────────────────────────────
// RENDER DAY
// ─────────────────────────────────────────
function renderDay(data, dayLabel) {
  const dateStr = dayLabel === "Saturday" ? data.satStr : data.sunStr;
  const daily   = getDailyForDay(data, dateStr);
  const hourly  = getHourlyForDay(data, dateStr);
  const aqi     = getAQIForDay(data, dateStr);
  const status  = climbingStatus(daily, hourly, aqi);
  const narr    = buildNarrative(daily, hourly, aqi, data.prev, dayLabel, data);
  const wetRock = (data.prev?.friRain ?? 0) > 1 || (data.prev?.thuRain ?? 0) > 1;

  // Status banner
  const statusBanner = `<div class="status-banner ${status.cls}"><span class="icon">${status.icon}</span>${status.text}</div>`;

  // Wet rock warning
  const wetRockHTML = wetRock ? `
    <div class="wet-rock-banner">
      <span class="wr-icon">💧</span>
      <div>
        <strong>Wet Rock Warning</strong>
        Rain recorded in the past 48 hours (${(data.prev?.friRain||0).toFixed(1)}mm yesterday${data.prev?.thuRain > 0.5 ? `, ${data.prev.thuRain.toFixed(1)}mm the day before` : ""}).
        Rock may still be wet — especially shaded walls, crack systems, and north-facing routes. Allow extra drying time.
      </div>
    </div>` : "";

  // Narrative card
  const narrativeHTML = `
    <div class="narrative-card">
      <div class="narr-header">
        <div class="narr-title">${dayLabel} at ${data.loc.name}</div>
        <div class="sun-times">
          ${daily?.sunrise ? `<span>🌅 ${daily.sunrise}</span>` : ""}
          ${daily?.sunset  ? `<span>🌇 ${daily.sunset}</span>`  : ""}
        </div>
      </div>
      <div class="narrative-body">
        <p>${narr.summary}</p>
        ${narr.aqiNote ? `<p>${narr.aqiNote}</p>` : ""}
      </div>
      <div class="time-blocks">
        <div class="time-block">
          <div class="tb-label">🌄 Morning (sunrise → noon)</div>
          <div class="tb-text">${narr.morning}</div>
        </div>
        <div class="time-block">
          <div class="tb-label">☀️ Afternoon (noon → dusk)</div>
          <div class="tb-text">${narr.afternoon}</div>
        </div>
      </div>
    </div>`;

  // Hero stats
  const rainFlag = (daily?.rain ?? 0) >= RAIN_FLAG;
  const heroStats = `
    <div class="hero-stats">
      <div class="stat-card">
        <span class="stat-icon">🌡️</span>
        <div class="stat-label">High / Low</div>
        <div class="stat-value" style="font-size:1.3rem">${daily ? `${daily.high}° / ${daily.low}°` : "—"}</div>
        <div class="stat-sub">°F</div>
      </div>
      <div class="stat-card ${rainFlag?"flagged":""}">
        <span class="stat-icon">${rainFlag?"🌧️":"☀️"}</span>
        <div class="stat-label">Rain Chance</div>
        <div class="stat-value">${daily ? daily.rain+"%" : "—"}</div>
        <div class="stat-sub">${rainFlag ? `⚠️ above ${RAIN_FLAG}%` : "daily max"}</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">💨</span>
        <div class="stat-label">Wind / Gusts</div>
        <div class="stat-value" style="font-size:1.2rem">${daily ? daily.wind : "—"}</div>
        <div class="stat-sub">${daily?.gusts > daily?.wind ? `gusts ${daily.gusts} mph` : "mph"}</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">${wmoIcon(daily?.code ?? 0)}</span>
        <div class="stat-label">Conditions</div>
        <div class="stat-value" style="font-size:0.95rem;padding-top:8px">${wmoDesc(daily?.code ?? -1)}</div>
      </div>
    </div>`;

  // AQI card
  const aqiData = aqiInfo(aqi?.peak ?? null);
  const aqiCard = aqi ? `
    <div class="aqi-card ${aqiData.cls}">
      <span class="aqi-icon">${aqiData.icon}</span>
      <div>
        <div class="aqi-label">Air Quality Index</div>
        <div class="aqi-number" style="color:${aqiData.color}">${aqi.peak}</div>
        <div class="aqi-category" style="color:${aqiData.color}">${aqiData.label}</div>
      </div>
      <div class="aqi-sources">
        <div>Peak AQI · avg ${aqi.avg}</div>
        ${aqi.pm25 ? `<div style="margin-top:4px">PM2.5 avg ${aqi.pm25} µg/m³</div>` : ""}
        <div style="margin-top:4px;font-size:0.6rem;color:var(--text-3)">Open-Meteo Air Quality</div>
      </div>
    </div>` : `<div class="aqi-card" style="background:var(--surface2)">
      <span class="aqi-icon">❓</span>
      <div><div class="aqi-label">Air Quality</div><div style="font-size:0.8rem;color:var(--text-3);margin-top:4px">No AQI data</div></div>
    </div>`;

  // Chart
  const chartHTML = `
    <div class="chart-section">
      <div class="section-label">Hourly Conditions — ${dayLabel}</div>
      ${renderHourlyChart(hourly)}
    </div>`;

  // Source table
  const sourceTable = buildSourceTable(data, dayLabel, dateStr);

  document.getElementById("mainContent").innerHTML = `
    <div class="day-panel">
      ${statusBanner}
      ${wetRockHTML}
      ${narrativeHTML}
      ${heroStats}
      ${aqiCard}
      ${chartHTML}
      ${sourceTable}
      <div class="last-updated">Last fetched ${new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})} · Open-Meteo + NWS</div>
    </div>`;
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function renderLocationTabs() {
  document.getElementById("locationTabs").innerHTML = LOCATIONS.map(loc => `
    <button class="loc-tab ${loc.id===currentLoc.id?"active":""}" onclick="switchLocation('${loc.id}')">
      ${loc.name} <span style="opacity:0.5">· ${loc.sub.split(",")[1].trim()}</span>
    </button>`).join("");
}

function renderDayNav(sat, sun) {
  document.getElementById("dayNav").innerHTML = ["Saturday","Sunday"].map(day => {
    const d = day==="Saturday" ? sat : sun;
    return `<button class="day-tab ${day===currentDay?"active":""}" onclick="switchDay('${day}')">
      ${day}<span class="day-date">${d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
    </button>`;
  }).join("");
}

function renderLoading() {
  document.getElementById("mainContent").innerHTML = `
    <div class="loading-state"><div class="spinner"></div><br>Fetching forecast for ${currentLoc.name}…</div>`;
}

async function switchLocation(locId) {
  currentLoc = LOCATIONS.find(l=>l.id===locId);
  renderLocationTabs();
  await loadAndRender();
}

function switchDay(day) {
  currentDay = day;
  const data = cache[currentLoc.id];
  if (data) { renderDayNav(data.sat, data.sun); renderDay(data, currentDay); }
}

async function loadAndRender() {
  renderLoading();
  try {
    const data = await loadData(currentLoc);
    if (!currentDay) currentDay = closerDay(data.sat, data.sun);
    renderDayNav(data.sat, data.sun);
    renderDay(data, currentDay);
  } catch(e) {
    document.getElementById("mainContent").innerHTML = `<div class="error-state">⚠️ Failed to load forecast: ${e.message}</div>`;
  }
}

renderLocationTabs();
loadAndRender();
</script>
</body>
</html>
